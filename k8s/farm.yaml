apiVersion: apps/v1
kind: Deployment
metadata:
  name: farm
  namespace: fiapfase5
spec:
  replicas: 1
  selector:
    matchLabels:
      app: farm
  template:
    metadata:
      labels:
        app: farm
    spec:
      containers:
        - name: farm
          image: fiap/farm:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__DefaultConnection
              value: "Server=sqlserver,1433;Database=DB_Fase5_Farm;User Id=sa;Password=Fiap@123;TrustServerCertificate=True"

            - name: Jwt__SecretKey
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET_KEY
            - name: Jwt__Issuer
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_ISSUER
            - name: Jwt__Audience
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_AUDIENCE
            - name: Jwt__ExpiresInMinutes
              value: "2000"
---
apiVersion: v1
kind: Service
metadata:
  name: farm
  namespace: fiapfase5
spec:
  selector:
    app: farm
  ports:
    - port: 80
      targetPort: 8080